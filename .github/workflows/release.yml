name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform windows/amd64 -ldflags "-s -w"

      - name: Zip
        run: |
          cd build/bin
          Compress-Archive -Path sshterm.exe -DestinationPath ../../sshterm-windows-amd64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "sshterm ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: sshterm-windows-amd64.zip
