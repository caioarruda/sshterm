name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    name: Generate version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -n1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform windows/amd64 -ldflags "-s -w"

      - name: Zip
        run: |
          cd build/bin
          Compress-Archive -Path sshterm.exe -DestinationPath ../../sshterm-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshterm-windows-amd64
          path: sshterm-windows-amd64.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev gcc pkg-config zip
          version: 1.0



      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.1

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build
        run: wails build -platform linux/amd64 -ldflags "-s -w" -tags webkit2_41

      - name: Zip
        run: |
          cd build/bin
          zip ../../sshterm-linux-amd64.zip sshterm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshterm-linux-amd64
          path: sshterm-linux-amd64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build-windows, build-linux]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "sshterm ${{ needs.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            sshterm-windows-amd64/sshterm-windows-amd64.zip
            sshterm-linux-amd64/sshterm-linux-amd64.zip